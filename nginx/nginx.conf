###############################################################################
# nginx.conf — xCloudVLMUI 反向代理
#
# 架構（HTTP / WebSocket）：
#   :80 / :443       → Next.js  :3000  （前端 SPA，HTTPS 支援攝影機權限）
#   /api/            → FastAPI  :8000  （後端 REST + WebSocket）
#   /api/vlm/ws      → FastAPI  :8000  ★ 攝影機串流推論 WS 端點（v2.0 新增）
#   /vlm/            → vlm-webui :8090 （已廢棄，保留向後相容）
#   /mqtt            → mosquitto :9001 （MQTT over WebSocket）
#
# WebSocket 升級：
#   使用 map $http_upgrade $connection_upgrade 動態決定 Connection 值
#   HTTP 請求 → Connection: keep-alive
#   WS  請求 → Connection: upgrade
#
# 架構（TCP Stream）：
#   :1883     → mosquitto :1883  (MQTT over TCP)
###############################################################################

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # 上傳大小限制（文件上傳 + Base64 攝影機影像幀）
    client_max_body_size 50M;

    # WebSocket upgrade 對應表：
    #   有 Upgrade 頭 → "upgrade"（WebSocket 協定升級）
    #   無 Upgrade 頭 → "keep-alive"（普通 HTTP 長連線）
    map $http_upgrade $connection_upgrade {
        default   upgrade;
        ""        keep-alive;
    }

    # Docker 內建 DNS resolver（動態解析服務名稱，避免啟動順序問題）
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── 上游服務 ────────────────────────────────────────────────────
    upstream nextjs {
        server frontend:3000;
        keepalive 16;
    }

    upstream fastapi {
        server backend:8000;
        keepalive 16;
    }

    upstream vlm_webui {
        server vlm-webui:8090;
    }

    # ── 允許連線 HTTPS 上游 ─────────────────────────────────────────
    proxy_ssl_verify off;

    # ── 主 Server Block ─────────────────────────────────────────────
    server {
        listen 80;
        listen 443 ssl;
        server_name _;
        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # ── NextAuth.js 認證路由（必須優先於 /api/）──────────────────
        # NextAuth 的 /api/auth/* 由 Next.js 處理，不轉發給 FastAPI
        location /api/auth/ {
            proxy_pass         http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── FastAPI 後端 (/api/*) ───────────────────────────────────
        # 同時支援：
        #   - 一般 HTTP 請求（REST API）
        #   - WebSocket 升級（/api/vlm/ws — 攝影機串流推論）
        location /api/ {
            # 在請求階段保存 client Host（含 port），供 proxy_redirect 使用
            set $client_host $http_host;
            proxy_pass         http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header   Host              $http_host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # WebSocket 升級頭（使用 map 動態決定 Connection 值）
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            # REST API 逾時保持 120s；WebSocket 長連線逾時 3600s
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
            # 修正 FastAPI 307 redirect：將內部 host 還原為 client 請求的 host+port
            proxy_redirect     ~^http://[^/]*(/.*)$ http://$client_host$1;
        }

        # ── FastAPI Swagger Docs ────────────────────────────────────
        location ~ ^/(docs|redoc|openapi.json) {
            proxy_pass         http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
        }

        # ── Prometheus Metrics（3.3 監控與可觀測性）──────────────
        # 端點：GET /metrics → FastAPI prometheus-fastapi-instrumentator
        # ⚠️  生產環境建議加入 IP 白名單限制（僅允許監控服務 scrape）
        # allow 192.168.0.0/16;   # 工廠內網
        # deny  all;
        location /metrics {
            proxy_pass         http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 10s;
        }

        # ── MQTT over WebSocket (/mqtt) ─────────────────────────────
        # 前端或外部工具可用 ws://localhost:8880/mqtt 連線
        location /mqtt {
            proxy_pass         http://mosquitto:9001;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── live-vlm-webui (/vlm/*) ────────────────────────────────
        # 移除 /vlm 前綴後轉發（vlm-webui 預設使用自簽 SSL）
        location /vlm/ {
            proxy_pass         https://vlm_webui/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            # WebRTC ICE 需要長連線
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── D435i HLS (/streams/d435i/*) ───────────────────────────
        location /streams/d435i/ {
            proxy_pass         http://mediamtx:8888/d435i/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            add_header         Cache-Control      "no-cache";
        }

        # ── Next.js 前端（所有其他路由）────────────────────────────
        location / {
            proxy_pass         http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Next.js HMR WebSocket
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_cache_bypass $http_upgrade;
        }
    }
}
