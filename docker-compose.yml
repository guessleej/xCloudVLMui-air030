###############################################################################
# docker-compose.yml — xCloudVLMui Platform [bot-air030]
#
# 目標硬體：Advantech AIR-030
# SoM     ：NVIDIA Jetson AGX Orin 64GB
# OS      ：NVIDIA JetPack 6.0 (L4T R36.3.0)
# 架構    ：ARM64 (aarch64)
# 加速    ：CUDA 12.2 · TensorRT 10.x · cuDNN 9.x
#
# Port 配置（bot-air030 專用，不與其他實例衝突）：
#   nginx    → 8880:80    ← 主要入口
#   backend  → 8001:8000
#   frontend → 3100:3000
#   llama-cpp→ 18080:8080
#   vlm-webui→ 8090:8090
#   cadvisor → 8091:8080
#   mosquitto→ 1883/9001
#
# 快速啟動：
#   make setup && make up
###############################################################################

name: xcloudvlmui-air030

# ── 共用環境變數 ─────────────────────────────────────────────────────
x-llm-env: &llm-env
  LLM_BASE_URL:    http://llama-cpp:8080
  LLM_MODEL:       gemma-4-e4b-it
  LLM_CTX_SIZE:    "131072"
  LLM_MAX_TOKENS:  "4096"
  LLM_TEMPERATURE: "0.1"
  EMBED_MODEL_URL: http://llama-cpp:8080
  EMBED_MODEL:     nomic-embed-text

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:

  # ──────────────────────────────────────────────────────────────────
  # [1] model-init — 從 HuggingFace 下載 GGUF 模型
  # ──────────────────────────────────────────────────────────────────
  model-init:
    image: python:3.11-slim
    container_name: air030-model-init
    platform: linux/arm64
    volumes:
      - model-data:/models
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - MODEL_REPO=${MODEL_REPO:-bartowski/google_gemma-4-e4b-it-GGUF}
      - MODEL_FILE=${MODEL_FILE:-gemma-4-e4b-it-Q4_K_M.gguf}
    command: >
      /bin/bash -c "
        MODEL=/models/$${MODEL_FILE} ;
        if [ -f \"$$MODEL\" ]; then echo '[model-init] already exists, skip.'; exit 0; fi ;
        pip install -q huggingface-hub ;
        python3 -c \"
          from huggingface_hub import hf_hub_download
          import os, shutil
          p = hf_hub_download(repo_id=os.environ['MODEL_REPO'],
                              filename=os.environ['MODEL_FILE'],
                              token=os.environ.get('HF_TOKEN') or None)
          shutil.move(p, '/models/' + os.environ['MODEL_FILE'])
          print('[model-init] Done')
        \"
      "
    restart: "no"
    networks: [air030-net]

  # ──────────────────────────────────────────────────────────────────
  # [2] mosquitto — Eclipse MQTT Broker
  # ──────────────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: air030-mqtt
    platform: linux/arm64
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - air030-mosquitto-data:/mosquitto/data
      - air030-mosquitto-log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -p 1883 -t health -m ping -q 0 2>/dev/null && echo ok || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks: [air030-net]
    logging: *default-logging

  # ──────────────────────────────────────────────────────────────────
  # [3] llama-cpp — CUDA 加速推論（Jetson AGX Orin CUDA 12.2）
  #     若 ghcr 映像無 arm64，改用：dustynv/llama.cpp:r36.3.0
  # ──────────────────────────────────────────────────────────────────
  llama-cpp:
    image: ghcr.io/ggerganov/llama.cpp:server-cuda
    container_name: air030-llama-cpp
    platform: linux/arm64
    runtime: nvidia
    restart: unless-stopped
    depends_on:
      model-init:
        condition: service_completed_successfully
    volumes:
      - model-data:/models:ro
    ports:
      - "18080:8080"
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    command: >
      --model /models/${MODEL_FILE:-gemma-4-e4b-it-Q4_K_M.gguf}
      --host 0.0.0.0 --port 8080
      --ctx-size 131072
      --n-gpu-layers 99
      --threads 8
      --flash-attn
      --log-disable
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks: [air030-net]
    logging: *default-logging
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ──────────────────────────────────────────────────────────────────
  # [4] vlm-webui — 即時視覺分析 WebUI（WebRTC）
  # ──────────────────────────────────────────────────────────────────
  vlm-webui:
    build:
      context: ./vlm-webui
      dockerfile: Dockerfile
      platforms: [linux/arm64]
    image: xcloudvlmui/vlm-webui:air030
    container_name: air030-vlm-webui
    restart: unless-stopped
    environment:
      <<: *llm-env
    depends_on:
      llama-cpp:
        condition: service_healthy
    ports:
      - "8090:8090"
    networks: [air030-net]
    logging: *default-logging

  # ──────────────────────────────────────────────────────────────────
  # [5] backend — FastAPI 中介層
  # ──────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      platforms: [linux/arm64]
    image: xcloudvlmui/backend:air030
    container_name: air030-backend
    restart: unless-stopped
    environment:
      <<: *llm-env
      APP_NAME:           "xCloudVLMui Platform [bot-air030]"
      VLM_WEBUI_URL:      http://vlm-webui:8090
      DATABASE_URL:       sqlite+aiosqlite:////data/xcloudvlm.db
      CHROMA_PERSIST_DIR: /data/chroma
      ALLOWED_ORIGINS:    '["http://localhost:3100","http://localhost:8880","http://localhost:8001","http://localhost"]'
      DEBUG:              "false"
      SECRET_KEY:         ${SECRET_KEY:-change-me-air030}
      MQTT_BROKER_HOST:   mosquitto
      MQTT_BROKER_PORT:   "1883"
      MQTT_ENABLED:       "true"
    depends_on:
      llama-cpp:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    volumes:
      - air030-backend-data:/data
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [air030-net]
    logging: *default-logging

  # ──────────────────────────────────────────────────────────────────
  # [6] frontend — Next.js 儀表板
  # ──────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      platforms: [linux/arm64]
      args:
        NEXTAUTH_URL:        http://localhost:8880
        NEXT_PUBLIC_API_URL: http://localhost:8001
        NEXT_PUBLIC_WS_URL:  ws://localhost:8001
    image: xcloudvlmui/frontend:air030
    container_name: air030-frontend
    restart: unless-stopped
    environment:
      NEXTAUTH_URL:         ${NEXTAUTH_URL:-http://localhost:8880}
      NEXTAUTH_SECRET:      ${NEXTAUTH_SECRET:-change-me}
      NEXT_PUBLIC_API_URL:  http://localhost:8001
      NEXT_PUBLIC_WS_URL:   ws://localhost:8001
      GOOGLE_CLIENT_ID:     ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3100:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 2>&1; exit 0"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks: [air030-net]
    logging: *default-logging

  # ──────────────────────────────────────────────────────────────────
  # [7] nginx — 反向代理
  # ──────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: air030-nginx
    platform: linux/arm64
    restart: unless-stopped
    depends_on: [frontend, backend]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8880:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/api/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks: [air030-net]
    logging: *default-logging

  # ──────────────────────────────────────────────────────────────────
  # [8] cadvisor — 容器資源監控
  # ──────────────────────────────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: air030-cadvisor
    platform: linux/arm64
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8091:8080"
    networks: [air030-net]
    logging: *default-logging

networks:
  air030-net:
    name: air030-xcloud-net
    driver: bridge

volumes:
  model-data:
    name: air030-model-data
  air030-mosquitto-data:
  air030-mosquitto-log:
  air030-backend-data:
