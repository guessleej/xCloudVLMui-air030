###############################################################################
# docker-compose.mac.yml — macOS 本機開發環境（完整獨立版）
#
# 用法: docker compose -f docker-compose.mac.yml up -d
#
# ⚠️  僅供 macOS 本機開發測試，不適用於 Jetson 生產環境。
#
# 與正式版差異：
#   - llama-cpp / vlm-webui → traefik/whoami HTTP stub（無 GPU 需求）
#   - model-init            → busybox exit 0（跳過下載）
#   - Port 對照：
#       nginx    → 8880:80  (HTTP + MQTT WebSocket ws://localhost:8880/mqtt)
#       backend  → 8001:8000
#       frontend → 3100:3000
#       cadvisor → 8091:8080
#       mosquitto→ 不對外暴露（TCP 走內網，WS 走 nginx /mqtt）
#   - cadvisor 移除 /dev/kmsg（macOS 不存在此裝置）
###############################################################################

name: xcloudvlmui-platform

x-llm-env: &llm-env
  LLM_BASE_URL:    http://llama-cpp:8080
  LLM_MODEL:       gemma-4-e4b-it
  LLM_CTX_SIZE:    "131072"
  LLM_MAX_TOKENS:  "4096"
  LLM_TEMPERATURE: "0.1"

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:

  # ── [1] model-init: 跳過下載 ─────────────────────────────────────────
  model-init:
    image: busybox:latest
    container_name: model-init
    command: ["sh", "-c", "echo '[dev] skip model download' && exit 0"]
    restart: "no"

  # ── [2] mosquitto ─────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: xcloud-mqtt
    restart: unless-stopped
    # 不對外暴露 port：TCP 1883 / WS 9001 均由 nginx 代理
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -p 1883 -t 'health/ping' -m 'ping' -q 0 2>/dev/null && echo ok || exit 1"]
      interval: 15s
      timeout:  5s
      retries:  3
      start_period: 10s
    logging: *default-logging

  # ── [3] llama-cpp stub (Jetson 替代) ──────────────────────────────────
  llama-cpp:
    image: traefik/whoami:latest
    container_name: llama-cpp
    restart: unless-stopped
    command: ["--port=8080"]    # backend LLM_BASE_URL 預期 port 8080
    ports:
      - "18080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080"]
      interval: 5s
      timeout:  3s
      retries:  5
      start_period: 5s
    logging: *default-logging

  # ── [4] vlm-webui stub (Jetson 替代) ──────────────────────────────────
  vlm-webui:
    image: traefik/whoami:latest
    container_name: vlm-webui
    restart: unless-stopped
    command: ["--port=8090"]    # nginx upstream 預期 port 8090
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090"]
      interval: 5s
      timeout:  3s
      retries:  5
      start_period: 5s
    logging: *default-logging

  # ── [5] backend ───────────────────────────────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: xcloud-backend
    restart: unless-stopped
    environment:
      <<: *llm-env
      APP_NAME:           "xCloudVLMui Platform [DEV]"
      VLM_WEBUI_URL:      http://vlm-webui:80
      DATABASE_URL:       sqlite+aiosqlite:////data/xcloudvlm.db
      CHROMA_PERSIST_DIR: /data/chroma
      ALLOWED_ORIGINS:    '["http://localhost:3100","http://localhost:8880","http://localhost","http://air-030"]'
      DEBUG:              "true"
      MQTT_BROKER_HOST:   mosquitto
      MQTT_BROKER_PORT:   "1883"
      MQTT_ENABLED:       "true"
    env_file:
      - path: ./backend/.env
        required: false
    volumes:
      - backend-data:/data
      - ./backend/uploads:/app/uploads
    ports:
      - "8001:8000"
    depends_on:
      llama-cpp:
        condition: service_started
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 20s
      timeout:  10s
      retries:  5
      start_period: 30s
    logging: *default-logging

  # ── [6] frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    container_name: xcloud-frontend
    restart: unless-stopped
    environment:
      - NEXTAUTH_URL=http://localhost:8880
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_VLM_WEBUI_URL=http://localhost:8880/vlm
      - NODE_ENV=production
    env_file:
      - path: ./frontend/.env.local
        required: false
    ports:
      - "3100:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000"]
      interval: 20s
      timeout:  10s
      retries:  5
      start_period: 15s
    logging: *default-logging

  # ── [7] nginx ─────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: xcloud-nginx
    restart: unless-stopped
    ports:
      - "8880:80"      # HTTP（前端 + API + MQTT WebSocket /mqtt）
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/api/health"]
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 15s
    logging: *default-logging

  # ── [8] cadvisor ──────────────────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: xcloud-cadvisor
    restart: unless-stopped
    privileged: true
    ports:
      - "8091:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    command:
      - "--housekeeping_interval=15s"
      - "--max_housekeeping_interval=20s"
      - "--event_storage_event_limit=default=0"
      - "--event_storage_age_limit=default=0"
      - "--disable_metrics=advtcp,cpuset,hugetlb,memory_numa,process,referenced_memory,resctrl,sched,tcp,udp"
      - "--store_container_labels=false"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 10s
    logging: *default-logging

# ── Named Volumes ──────────────────────────────────────────────────────
volumes:
  model-data:
    driver: local
  backend-data:
    driver: local
  mosquitto-data:
    driver: local
  mosquitto-log:
    driver: local

networks:
  default:
    name: xcloud-net
